<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Teal accent line -->
  <rect x="100" y="250" width="120" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Name -->
  <text x="100" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">
    Ardhiansyah
  </text>

  <!-- Subtitle -->
  <text x="100" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#a1a1aa" font-weight="400" letter-spacing="0.5">
    0x Enthusiast · Mobile Developer · IT Support
  </text>

  <!-- Decorative dots -->
  <circle cx="1060" cy="150" r="6" fill="#0d9488" opacity="0.6"/>
  <circle cx="1090" cy="150" r="4" fill="#14b8a6" opacity="0.4"/>
  <circle cx="1115" cy="150" r="2" fill="#2dd4bf" opacity="0.3"/>

  <circle cx="1060" cy="480" r="3" fill="#0d9488" opacity="0.3"/>
  <circle cx="1080" cy="480" r="5" fill="#14b8a6" opacity="0.4"/>
  <circle cx="1105" cy="480" r="7" fill="#2dd4bf" opacity="0.2"/>
</svg>
